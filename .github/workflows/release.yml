name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # Pinned to a specific runner image so a `macos-latest` rotation can't
    # silently change the toolchain or signing behaviour mid-release. Bump
    # explicitly when retesting on a newer macOS version.
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for `git describe` and release notes

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Import Developer ID code signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          rm -f "$CERT_PATH"

      - name: Build, sign, package, notarize
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: make release VERSION=${{ github.ref_name }}

      - name: Generate release notes
        run: ./scripts/release-notes.sh ${{ github.ref_name }} > dist/RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          RELEASE_NAME="touchid-agent-${VERSION}-darwin-universal"
          gh release create "$VERSION" \
            --title "touchid-agent ${VERSION}" \
            --notes-file dist/RELEASE_NOTES.md \
            "dist/${RELEASE_NAME}.tar.gz" \
            "dist/${RELEASE_NAME}.tar.gz.sha256" \
            "dist/${RELEASE_NAME}.zip" \
            "dist/${RELEASE_NAME}.zip.sha256"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for release assets to propagate
        run: sleep 10

      - name: Download SHA-256 sidecar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          ASSET="touchid-agent-${VERSION}-darwin-universal.tar.gz.sha256"
          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "$ASSET"
          SHA256=$(awk '{print $1}' "$ASSET")
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "VERSION_BARE=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Check out homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ignaciojimenez/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          set -euo pipefail
          sed -i \
            -e "s/^  version \".*\"/  version \"${VERSION_BARE}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" \
            Formula/touchid-agent.rb
          echo "--- Updated formula ---"
          grep -E '^\s*(version|sha256|url)' Formula/touchid-agent.rb

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/touchid-agent.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "touchid-agent ${{ github.ref_name }}"
          git push
