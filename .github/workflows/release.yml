name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run_version:
        description: 'Dry-run only: version label for artifacts (e.g. v0.0.0-dryrun). Skips release creation and tap update.'
        required: true
        default: 'v0.0.0-dryrun'

permissions:
  contents: write

jobs:
  release:
    # Pinned to a specific runner image so a `macos-latest` rotation can't
    # silently change the toolchain or signing behaviour mid-release. Bump
    # explicitly when retesting on a newer macOS version.
    runs-on: macos-14
    timeout-minutes: 30
    env:
      # On tag push: github.ref_name is the tag (e.g. v0.4.0).
      # On workflow_dispatch: use the version label from the input.
      VERSION: ${{ inputs.dry_run_version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history for `git describe` and release notes

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Import Developer ID signing certificates
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          APP_CERT_PATH="$RUNNER_TEMP/app-cert.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/installer-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$APP_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$APP_CERT_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Installer cert is optional: if the secret is unset, the pkg
          # build step downstream will produce an unsigned pkg (or skip
          # entirely). This keeps `release.yml` working through the
          # transitional period where the installer cert isn't yet
          # provisioned.
          if [[ -n "$MACOS_INSTALLER_CERTIFICATE" ]]; then
            echo -n "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode -o "$INSTALLER_CERT_PATH"
            security import "$INSTALLER_CERT_PATH" \
              -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"
            rm -f "$INSTALLER_CERT_PATH"
          fi

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          rm -f "$APP_CERT_PATH"

      - name: Build, sign, package, notarize
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: make release VERSION="$VERSION"

      - name: Build .pkg installer
        env:
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: make pkg VERSION="$VERSION"

      - name: Build .mobileconfig profile
        env:
          MACOS_INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
        run: make mobileconfig VERSION="$VERSION"

      # Catch profile-schema regressions before the artifact ships to
      # the fleet: verify the CMS signature validates and the decoded
      # payload carries all four managed keys under our bundle ID.
      - name: Verify .mobileconfig payload
        run: |
          set -euo pipefail
          PROFILE="dist/touchid-agent-${VERSION}.mobileconfig"
          BUNDLE_ID="com.ignaciojimenez.touchid-agent"

          if head -c 5 "$PROFILE" | grep -q '<?xml'; then
            echo "::error::profile is unsigned XML (signing failed)"
            exit 1
          fi

          DECODED=$(security cms -D -i "$PROFILE")
          if [[ -z "$DECODED" ]]; then
            echo "::error::CMS signature did not validate"
            exit 1
          fi

          for key in audit_log_path peer_check rate_limit allowed_callers; do
            if ! grep -qF "<key>$key</key>" <<<"$DECODED"; then
              echo "::error::payload missing managed key: $key"
              exit 1
            fi
          done

          if ! grep -qF "<key>$BUNDLE_ID</key>" <<<"$DECODED"; then
            echo "::error::payload does not target bundle ID $BUNDLE_ID"
            exit 1
          fi

          echo "mobileconfig payload OK"

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ env.VERSION }}
          path: dist/
          retention-days: 7

      - name: Generate release notes
        if: github.event_name == 'push'
        run: ./scripts/release-notes.sh "$VERSION" > dist/RELEASE_NOTES.md

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RELEASE_NAME="touchid-agent-${VERSION}-darwin-universal"
          PKG_NAME="touchid-agent-${VERSION}.pkg"
          MOBILECONFIG_NAME="touchid-agent-${VERSION}.mobileconfig"
          gh release create "$VERSION" \
            --title "touchid-agent ${VERSION}" \
            --notes-file dist/RELEASE_NOTES.md \
            "dist/${RELEASE_NAME}.tar.gz" \
            "dist/${RELEASE_NAME}.tar.gz.sha256" \
            "dist/${RELEASE_NAME}.zip" \
            "dist/${RELEASE_NAME}.zip.sha256" \
            "dist/${PKG_NAME}" \
            "dist/${PKG_NAME}.sha256" \
            "dist/${MOBILECONFIG_NAME}"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

  update-homebrew:
    if: github.event_name == 'push'
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for release assets to propagate
        run: sleep 10

      - name: Download SHA-256 sidecar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          ASSET="touchid-agent-${VERSION}-darwin-universal.tar.gz.sha256"
          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "$ASSET"
          SHA256=$(awk '{print $1}' "$ASSET")
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "VERSION_BARE=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Check out homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: ignaciojimenez/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          set -euo pipefail
          sed -i \
            -e "s/^  version \".*\"/  version \"${VERSION_BARE}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" \
            Formula/touchid-agent.rb
          echo "--- Updated formula ---"
          grep -E '^\s*(version|sha256|url)' Formula/touchid-agent.rb

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/touchid-agent.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "touchid-agent ${{ github.ref_name }}"
          git push
